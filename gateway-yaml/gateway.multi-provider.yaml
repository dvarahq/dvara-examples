# Multi-provider gateway with routing and API keys
# Usage: cp examples/gateway-yaml/gateway.multi-provider.yaml ./gateway.yaml
#        OPENAI_API_KEY=sk-... ANTHROPIC_API_KEY=sk-ant-... ./mvnw -pl gateway-server spring-boot:run

providers:
  - name: openai
    type: openai
    api_key: ${OPENAI_API_KEY}

  - name: anthropic
    type: anthropic
    api_key: ${ANTHROPIC_API_KEY}

routes:
  - id: gpt-route
    model: "gpt*"
    provider: openai

  - id: claude-route
    model: "claude*"
    provider: anthropic

  - id: balanced-route
    model: "auto*"
    strategy: round-robin
    providers:
      - provider: openai
      - provider: anthropic

api_keys:
  - generate: true
    tenant: production
    name: prod-key
    scopes: [completions:write]

  - generate: true
    tenant: development
    name: dev-key
