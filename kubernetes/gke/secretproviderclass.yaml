# Workload-Identity-for-secrets path (SECRET_MODE=secret-manager).
#
# Maps GCP Secret Manager secrets → a synced k8s Secret named
# `dvara-platform`, which the chart consumes via secrets.existingSecret.
# The pods' Workload-Identity-bound GCP SA (dvara-gke@PROJECT) holds
# roles/secretmanager.secretAccessor, so the secret material is fetched
# with the pod identity — never passed on a `helm --set` command line or
# left in Helm release metadata.
#
# Requires the GKE Secret Manager CSI provider. On a recent GKE this is the
# managed add-on (`gcloud container clusters create ... --enable-secret-manager`,
# or `clusters update --enable-secret-manager`). CONFIRM the exact flag /
# provider name for YOUR GKE version before relying on this path — older
# clusters need the community secrets-store-csi-driver + GCP provider
# installed via Helm. deploy.sh's SECRET_MODE=k8s path avoids the CSI
# dependency for first-boot verification.
#
# The `secretObjects` block is what makes this env-var-compatible: the CSI
# driver syncs the mounted secrets into a real k8s Secret with the exact
# keys the chart's deployments reference via secretKeyRef.
#
# deploy.sh substitutes @@PROJECT_ID@@ and creates the six Secret Manager
# secrets (dvara-license-key, dvara-encryption-master-password,
# dvara-actuator-api-key, dvara-actuator-metrics-api-key,
# dvara-audit-hmac-secret, dvara-db-password).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: dvara-platform
  namespace: dvara
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/@@PROJECT_ID@@/secrets/dvara-license-key/versions/latest"
        path: "enterprise-license-key"
      - resourceName: "projects/@@PROJECT_ID@@/secrets/dvara-encryption-master-password/versions/latest"
        path: "gateway-encryption-master-password"
      - resourceName: "projects/@@PROJECT_ID@@/secrets/dvara-actuator-api-key/versions/latest"
        path: "gateway-server-api-key"
      - resourceName: "projects/@@PROJECT_ID@@/secrets/dvara-actuator-metrics-api-key/versions/latest"
        path: "gateway-metrics-api-key"
      - resourceName: "projects/@@PROJECT_ID@@/secrets/dvara-audit-hmac-secret/versions/latest"
        path: "audit-hmac-secret"
  secretObjects:
    - secretName: dvara-platform
      type: Opaque
      data:
        - objectName: "enterprise-license-key"
          key: "enterprise-license-key"
        - objectName: "gateway-encryption-master-password"
          key: "gateway-encryption-master-password"
        - objectName: "gateway-server-api-key"
          key: "gateway-server-api-key"
        - objectName: "gateway-metrics-api-key"
          key: "gateway-metrics-api-key"
        - objectName: "audit-hmac-secret"
          key: "audit-hmac-secret"