# DVARA Helm chart values — multi-tenant SaaS deploy
#
# Shape: you operate DVARA AS A SaaS for your customers. Each customer
# becomes a tenant in your install. Includes flightdeck Console for tenant
# onboarding, MCP Proxy for tool governance, autoscaling for elastic load,
# PodDisruptionBudget for disruption protection, ServiceMonitor for
# Prometheus Operator integration.
#
# Pre-requisites:
#   - PostgreSQL 16 with TLS, NOT bundled. Use managed cloud (RDS / Cloud
#     SQL / DigitalOcean Managed PG) sized for your tenant scale.
#   - Prometheus Operator installed (for ServiceMonitor CRD)
#   - cert-manager + an ingress controller (nginx or similar)
#   - Production-signed DVARA license envelope (the GHCR images carry the
#     production verify key; a test-signed envelope will not validate)
#
# Install:
#
#   helm install dvara oci://ghcr.io/dvarahq/dvara/charts/meridian \
#     --version 1.0.0 \
#     --namespace dvara --create-namespace \
#     --values ./values.yaml \
#     --set "secrets.enterpriseLicenseKey=$GATEWAY_LICENSE_KEY" \
#     --set "secrets.gatewayEncryptionMasterPassword=$GATEWAY_ENCRYPTION_MASTER_PASSWORD" \
#     --set "secrets.gatewayServerApiKey=$GATEWAY_SERVER_API_KEY" \
#     --set "secrets.gatewayMetricsApiKey=$GATEWAY_METRICS_API_KEY" \
#     --set "ingress.baseDomain=api.yoursaas.com"
#
# `ingress.baseDomain` derives both hosts automatically — produces
# `api.api.yoursaas.com` + `flightdeck.api.yoursaas.com`. Adjust as needed.
#
# After install:
#   1. /setup on the flightdeck hostname — create the platform owner
#   2. Set up SSO via the Settings page (OIDC issuer or SAML metadata URL)
#   3. Onboard customers via flightdeck Console → Tenants → New tenant +
#      Users → Invite admin (sends activation email).
#   4. Customer logs in at /portal, generates their own API keys + BYOK
#      provider credentials. The platform owner does NOT see customer
#      provider keys (AES-256-GCM encrypted at rest).

global:
  imageRegistry: ""
  imagePullSecrets: []

# ---- gateway-server: scale for traffic ----
gatewayServer:
  enabled: true
  replicaCount: 3

  image:
    repository: ghcr.io/dvarahq/dvara/dvara-llm-gateway
    tag: ""  # defaults to Chart.appVersion; pin to GA tag
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  javaOpts: "-Xms512m -Xmx1536m"

  # Cross-zone spread — every replica in a different AZ if possible.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: gateway-server

  # Autoscale on CPU. Add custom metrics (request rate, queue depth) via
  # `autoscaling.customMetrics` once you've baselined production load.
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 30
        policies:
          - type: Percent
            value: 50
            periodSeconds: 60
      scaleDown:
        # Slower scale-down — protects against bouncing on cyclical loads.
        stabilizationWindowSeconds: 600
        policies:
          - type: Percent
            value: 20
            periodSeconds: 180

  # Voluntary-disruption protection. At least 2 replicas always available
  # during node drains / upgrades.
  pdb:
    enabled: true
    minAvailable: 2

  serviceMonitor:
    enabled: true
    interval: 15s
    additionalLabels:
      prometheus: kube-prometheus  # match your Prometheus Operator selector

# ---- flightdeck: Console + tenant Portal ----
flightdeck:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # Flightdeck doesn't need autoscaling — it's a low-QPS admin surface.
  # Two replicas is purely for uptime during rolling updates.

# ---- mcp-proxy: tool-call governance ----
mcpProxyServer:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 75
  pdb:
    enabled: true
    minAvailable: 1
  serviceMonitor:
    enabled: true
    interval: 15s

secrets:
  create: true
  enterpriseLicenseKey: ""             # SET VIA --set or external Secret
  gatewayEncryptionMasterPassword: ""  # ESCROW OFFLINE
  gatewayServerApiKey: ""              # MUST DIFFER from gatewayMetricsApiKey
  gatewayMetricsApiKey: ""
  # SaaS shape — DON'T set provider keys here. Tenants BYO via the Portal.
  providerKeys: {}

ingress:
  enabled: true
  className: nginx
  annotations:
    # Adjust for your ingress controller. These are nginx-ingress.
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # cert-manager auto-issuance (matching ClusterIssuer must exist):
    cert-manager.io/cluster-issuer: letsencrypt-prod
  baseDomain: ""  # SET — e.g. dvara.yoursaas.com → produces
                  # api.dvara.yoursaas.com + flightdeck.dvara.yoursaas.com
