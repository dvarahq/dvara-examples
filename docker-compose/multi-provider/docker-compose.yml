# Multi-provider stack — OpenAI + Anthropic out of the box.
#
# Dvara auto-registers a provider whenever its API key env var is set.
# To add more (Gemini, Mistral, Cohere, Groq, Azure OpenAI, Bedrock,
# Ollama), add the matching env var(s) below and the corresponding entry
# in .env. See https://dvarahq.com/docs/core-concepts/providers for the
# full list and per-provider setup.
#
# Usage:
#   cp .env.example .env   # edit with whichever keys you have
#   docker compose up -d
#   curl -s http://localhost:8080/v1/models | jq '.data[].id'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dvara
      POSTGRES_USER: dvara
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dvara}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dvara"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  dvara-gateway:
    image: ghcr.io/dvarahq/dvara/dvara-llm-gateway:1.0.1
    platform: linux/amd64
    pull_policy: always
    ports:
      - "8080:8080"
    environment:
      DVARA_LICENSE_KEY: ${DVARA_LICENSE_KEY}
      # rc24+ required secrets (per dvarahq/dvara#665). Without these the
      # actuator chain 401s every flightdeck License Console call,
      # /actuator/prometheus 401s every scrape, and ENCRYPTED-mode
      # provider credentials can't be persisted. Generate via
      # `openssl rand -base64 32` and put values in .env (see .env.example).
      DVARA_ENCRYPTION_MASTER_PASSWORD: ${DVARA_ENCRYPTION_MASTER_PASSWORD}
      DVARA_ACTUATOR_API_KEY: ${DVARA_ACTUATOR_API_KEY}
      DVARA_ACTUATOR_METRICS_API_KEY: ${DVARA_ACTUATOR_METRICS_API_KEY}
      DVARA_AUDIT_HMAC_SECRET: ${DVARA_AUDIT_HMAC_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dvara
      SPRING_DATASOURCE_USERNAME: dvara
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-dvara}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Add more providers here — uncomment and set in .env:
      # GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      # COHERE_API_KEY: ${COHERE_API_KEY:-}
      # GROQ_API_KEY: ${GROQ_API_KEY:-}
      # AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      # AZURE_OPENAI_BASE_URL: ${AZURE_OPENAI_BASE_URL:-}
      DVARA_LLM_GATEWAY_REQUIRE_API_KEY: ${DVARA_LLM_GATEWAY_REQUIRE_API_KEY:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  dvara-flightdeck:
    image: ghcr.io/dvarahq/dvara/dvara-flightdeck:1.0.1
    platform: linux/amd64
    pull_policy: always
    ports:
      - "8090:8090"
    environment:
      DVARA_LICENSE_KEY: ${DVARA_LICENSE_KEY}
      # rc24+ required secrets (per dvarahq/dvara#665). Without these the
      # actuator chain 401s every flightdeck License Console call,
      # /actuator/prometheus 401s every scrape, and ENCRYPTED-mode
      # provider credentials can't be persisted. Generate via
      # `openssl rand -base64 32` and put values in .env (see .env.example).
      DVARA_ENCRYPTION_MASTER_PASSWORD: ${DVARA_ENCRYPTION_MASTER_PASSWORD}
      DVARA_ACTUATOR_API_KEY: ${DVARA_ACTUATOR_API_KEY}
      DVARA_ACTUATOR_METRICS_API_KEY: ${DVARA_ACTUATOR_METRICS_API_KEY}
      DVARA_AUDIT_HMAC_SECRET: ${DVARA_AUDIT_HMAC_SECRET}
      DVARA_FLIGHTDECK_GATEWAY_URL: http://dvara-gateway:8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dvara
      SPRING_DATASOURCE_USERNAME: dvara
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-dvara}
    depends_on:
      dvara-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  pgdata:
