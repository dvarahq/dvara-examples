# Docker Compose overlay for Grafana + Prometheus monitoring.
# Usage:
#
#   # 1. Write your GATEWAY_METRICS_API_KEY to a file next to this compose:
#   echo -n "$GATEWAY_METRICS_API_KEY" > grafana/gateway-metrics-api-key
#   chmod 600 grafana/gateway-metrics-api-key
#
#   # 2. Start the base DVARA stack + this overlay:
#   docker compose \
#     -f docker-compose/full/docker-compose.yml \
#     -f grafana/docker-compose.monitoring.yml \
#     up -d
#
# Adds Prometheus (scrapes gateway-server + flightdeck, optionally
# mcp-proxy-server) and Grafana (pre-provisioned dashboards + datasource)
# to the base DVARA stack.

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./grafana/alerts/dvara-alerts.yml:/etc/prometheus/rules/dvara-alerts.yml:ro
      - prometheus-data:/prometheus
    # The bearer_token_file in prometheus.yml points at this path:
    secrets:
      - source: gateway_metrics_api_key
        target: /etc/prometheus/secrets/gateway-metrics-api-key
        mode: 0400
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      gateway-server:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-dvara}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dvara-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

# Secret mounted into prometheus to satisfy the bearer_token_file
# in scrape_configs. The token itself comes from a host file —
# write your GATEWAY_METRICS_API_KEY value there (chmod 600) before
# `docker compose up`.
secrets:
  gateway_metrics_api_key:
    file: ./grafana/gateway-metrics-api-key

volumes:
  prometheus-data:
  grafana-data:
